<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1A1F"/>
      <stop offset="100%" style="stop-color:#1A2B33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58CC02"/>
      <stop offset="100%" style="stop-color:#1CB0F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1F353F" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
  </g>

  <!-- Left accent bar -->
  <rect x="60" y="120" width="4" height="160" fill="url(#accent)" rx="2"/>

  <!-- Clapperboard icon area -->
  <rect x="72" y="130" width="64" height="52" rx="6" fill="#1F353F" stroke="#2A4050" stroke-width="1.5"/>
  <rect x="72" y="120" width="64" height="18" rx="4" fill="#58CC02" opacity="0.9"/>
  <!-- Clapperboard stripes -->
  <clipPath id="cl"><rect x="72" y="120" width="64" height="18" rx="4"/></clipPath>
  <g clip-path="url(#cl)" fill="#46A302">
    <rect x="78" y="120" width="8" height="18"/>
    <rect x="94" y="120" width="8" height="18"/>
    <rect x="110" y="120" width="8" height="18"/>
    <rect x="126" y="120" width="8" height="18"/>
  </g>
  <!-- Film reel dots -->
  <circle cx="104" cy="156" r="14" fill="#131F24" stroke="#2A4050" stroke-width="1.5"/>
  <circle cx="104" cy="156" r="4" fill="#58CC02" opacity="0.7"/>

  <!-- Main title -->
  <text x="160" y="170" font-family="'Space Mono', 'Courier New', monospace" font-size="52" font-weight="700" fill="white" filter="url(#glow)">SceneFlow Director</text>

  <!-- Chinese subtitle -->
  <text x="160" y="210" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="22" fill="#9EAFB8" letter-spacing="4">导演台 — AI 分镜与短剧创作工作台</text>

  <!-- Divider line with gradient -->
  <rect x="160" y="232" width="480" height="2" fill="url(#accent)" rx="1" opacity="0.8"/>

  <!-- Feature tags -->
  <g font-family="'Space Mono', monospace" font-size="13" fill="#58CC02">
    <rect x="160" y="250" width="140" height="28" rx="14" fill="#58CC02" fill-opacity="0.12" stroke="#58CC02" stroke-width="1" stroke-opacity="0.4"/>
    <text x="230" y="269" text-anchor="middle" fill="#58CC02">智能分镜生成</text>

    <rect x="314" y="250" width="120" height="28" rx="14" fill="#1CB0F6" fill-opacity="0.12" stroke="#1CB0F6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="374" y="269" text-anchor="middle" fill="#1CB0F6">剧本工坊</text>

    <rect x="448" y="250" width="140" height="28" rx="14" fill="#CE82FF" fill-opacity="0.12" stroke="#CE82FF" stroke-width="1" stroke-opacity="0.4"/>
    <text x="518" y="269" text-anchor="middle" fill="#CE82FF">36 位导演风格</text>

    <rect x="602" y="250" width="120" height="28" rx="14" fill="#FF9600" fill-opacity="0.12" stroke="#FF9600" stroke-width="1" stroke-opacity="0.4"/>
    <text x="662" y="269" text-anchor="middle" fill="#FF9600">运镜知识库</text>
  </g>

  <!-- Right side: shot card mockup -->
  <g transform="translate(820, 60)">
    <!-- Card background -->
    <rect x="0" y="0" width="380" height="280" rx="12" fill="#1F353F" stroke="#2A4050" stroke-width="1.5" opacity="0.9"/>

    <!-- Card header -->
    <rect x="0" y="0" width="380" height="44" rx="12" fill="#264653"/>
    <rect x="0" y="32" width="380" height="12" fill="#264653"/>
    <text x="20" y="27" font-family="monospace" font-size="12" fill="#9EAFB8">SHOT 01</text>
    <rect x="280" y="12" width="60" height="20" rx="10" fill="#58CC02" fill-opacity="0.2" stroke="#58CC02" stroke-width="1"/>
    <text x="310" y="26" font-family="monospace" font-size="11" fill="#58CC02" text-anchor="middle">近景</text>

    <!-- Shot info rows -->
    <g font-family="monospace" font-size="12">
      <text x="20" y="75" fill="#5E7480">机位</text><text x="80" y="75" fill="#FFFFFF">仰角 · Low Angle</text>
      <text x="20" y="102" fill="#5E7480">运镜</text><text x="80" y="102" fill="#FFFFFF">慢推 · Slow Push In</text>
      <text x="20" y="129" fill="#5E7480">灯光</text><text x="80" y="129" fill="#9EAFB8">侧逆光，冷蓝色调，高对比</text>
      <text x="20" y="156" fill="#5E7480">声音</text><text x="80" y="156" fill="#9EAFB8">心跳声渐强，环境音减弱</text>
    </g>

    <!-- EN prompt box -->
    <rect x="12" y="170" width="356" height="50" rx="8" fill="#131F24" stroke="#2A4050" stroke-width="1"/>
    <text x="20" y="188" font-family="monospace" font-size="10" fill="#58CC02">EN PROMPT</text>
    <text x="20" y="206" font-family="monospace" font-size="10" fill="#9EAFB8">Close-up, low angle, slow push in,</text>
    <text x="20" y="218" font-family="monospace" font-size="10" fill="#9EAFB8">cold blue backlight, cinematic...</text>

    <!-- Copy button -->
    <rect x="12" y="232" width="356" height="36" rx="8" fill="#264653" stroke="#2A4050" stroke-width="1"/>
    <text x="194" y="255" font-family="monospace" font-size="12" fill="#58CC02" text-anchor="middle">📋 复制英文提示词</text>
  </g>

  <!-- Bottom: model/version info -->
  <text x="160" y="360" font-family="monospace" font-size="12" fill="#5E7480">Deepseek · Claude · Seedance 2.0 · Kling 3.0 · Veo 3.1</text>
  <text x="160" y="380" font-family="monospace" font-size="11" fill="#2A4050">MIT License · github.com/robin20260517/SceneFlow-Director</text>
</svg>
